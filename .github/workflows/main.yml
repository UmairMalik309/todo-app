name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stop Existing Container
        run: |
          docker stop myapp || true
          docker rm myapp || true

      - name: Build Docker Image
        run: |
          docker build -t myapp:latest .

      - name: Run Container
        run: |
          docker run -d \
            --name myapp \
            --restart unless-stopped \
            -p 3000:3000 \
            myapp:latest
